<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <script>
            (function () {
                try {
                    const savedTheme = localStorage.getItem("notes-theme");
                    const hour = new Date().getHours();
                    const theme = savedTheme || (hour >= 19 || hour < 7 ? "dark" : "light");
                    document.documentElement.setAttribute("data-theme", theme);
                } catch (_error) {
                    document.documentElement.setAttribute("data-theme", "light");
                }
            })();
        </script>

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />

        <meta http-equiv="pragma" content="no-cache" />

        <style>

            :root {
                --paper: #fffff8;
                --ink: #111111;
                --muted: #5e5a50;
                --rule: rgba(17, 17, 17, 0.16);
                --rule-strong: rgba(17, 17, 17, 0.34);
                --accent: #8f2f1d;
                --accent-dark: #5d1d12;
                --soft: #f4efe2;
                --shadow: rgba(24, 20, 14, 0.14);
                color-scheme: light;
            }

            html[data-theme="dark"] {
                --paper: #242424;
                --ink: #efeadc;
                --muted: #c8c1b2;
                --rule: rgba(239, 234, 220, 0.18);
                --rule-strong: rgba(239, 234, 220, 0.34);
                --accent: #d59a7f;
                --accent-dark: #d59a7f;
                --soft: #303030;
                --shadow: transparent;
                color-scheme: dark;
            }

            * {
                box-sizing: border-box;
            }

            .staticrypt-html,
            .staticrypt-body {
                min-height: 100%;
                margin: 0;
            }

            .staticrypt-html {
                background: var(--paper);
            }

            .staticrypt-body {
                color: var(--ink);
                font-family: et-book, Palatino, "Palatino Linotype", "Palatino LT STD", "Book Antiqua", Georgia, serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                min-height: 100vh;
                background: var(--paper);
                display: flex;
                align-items: center;
                padding: clamp(2rem, 6vw, 5rem) clamp(1.25rem, 5vw, 4rem);
                transition: background-color 180ms ease, color 180ms ease;
            }

            .staticrypt-page {
                width: min(100%, 1120px);
                margin: 0 auto;
                display: grid;
                grid-template-columns: minmax(0, 0.62fr) minmax(15rem, 0.38fr);
                gap: clamp(2rem, 6vw, 5.5rem);
                align-items: end;
                position: relative;
            }

            .staticrypt-page::before {
                content: "";
                position: absolute;
                inset: clamp(-2rem, -4vw, -1rem) auto clamp(-2rem, -4vw, -1rem) calc(62% + clamp(1rem, 3vw, 2.75rem));
                width: 1px;
                background: var(--rule);
            }

            .staticrypt-form {
                position: relative;
                padding: clamp(2rem, 5vw, 4rem) 0 0;
                max-width: 43rem;
            }

            .staticrypt-kicker {
                margin: 0 0 1.25rem;
                font-size: 0.78rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--accent);
            }

            .staticrypt-title {
                margin: 0;
                max-width: 11ch;
                font-size: clamp(3.3rem, 10vw, 8.2rem);
                line-height: 0.86;
                letter-spacing: -0.055em;
                font-weight: 400;
            }

            .staticrypt-title .small-caps {
                display: block;
                margin-bottom: 0.35rem;
                font-size: clamp(1.15rem, 2vw, 1.7rem);
                line-height: 1.2;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                color: var(--muted);
            }

            .staticrypt-instructions {
                max-width: 34rem;
                margin: 1.6rem 0 2.2rem;
                font-size: clamp(1.2rem, 2vw, 1.55rem);
                line-height: 1.45;
            }

            .staticrypt-instructions p {
                margin: 0;
            }

            .staticrypt-hr {
                width: min(19rem, 60%);
                margin: 0 0 2rem;
                border: 0;
                border-top: 1px solid var(--rule-strong);
            }

            .staticrypt-fieldset {
                width: min(100%, 34rem);
                padding: 1.25rem;
                background: var(--paper);
                border: 1px solid var(--rule);
                box-shadow: none;
            }

            html[data-theme="dark"] .staticrypt-fieldset {
                background: var(--paper);
            }

            .staticrypt-password-container {
                position: relative;
                margin: 0 0 1rem;
                border-bottom: 1px solid var(--ink);
                background: linear-gradient(180deg, rgba(244, 239, 226, 0.55), rgba(255, 255, 248, 0.2));
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                min-height: 3.6rem;
                padding: 0.85rem 3.25rem 0.75rem 0.9rem;
                border: 0;
                outline: 0;
                background: transparent;
                color: var(--ink);
                font: inherit;
                font-size: 1.25rem;
            }

            .staticrypt-form input::placeholder {
                color: rgba(17, 17, 17, 0.45);
                font-style: italic;
            }

            .staticrypt-form input[type="password"]:focus,
            .staticrypt-form input[type="text"]:focus {
                box-shadow: inset 0 -3px 0 var(--accent);
            }

            .staticrypt-toggle-password-visibility {
                position: absolute;
                right: 0.65rem;
                top: 50%;
                width: 1.35rem;
                height: 1.35rem;
                padding: 0;
                transform: translateY(-50%);
                cursor: pointer;
                opacity: 0.62;
                filter: sepia(100%) saturate(70%) brightness(45%);
            }

            html[data-theme="dark"] .staticrypt-toggle-password-visibility {
                filter: invert(88%) sepia(14%) saturate(509%) hue-rotate(344deg) brightness(101%);
            }

            .staticrypt-theme-switch {
                position: fixed;
                top: 1rem;
                right: 1rem;
                z-index: 10;
                display: inline-flex;
                align-items: center;
                gap: 0.45rem;
                min-height: 2.35rem;
                padding: 0.35rem 0.7rem;
                border: 1px solid var(--rule-strong);
                border-radius: 999px;
                background: var(--paper);
                color: var(--ink);
                box-shadow: none;
                font: inherit;
                font-size: 0.92rem;
                line-height: 1;
                cursor: pointer;
            }

            html[data-theme="dark"] .staticrypt-theme-switch {
                background: var(--paper);
            }

            .staticrypt-theme-switch:hover,
            .staticrypt-theme-switch:focus-visible {
                border-color: var(--accent);
                outline: none;
            }

            .staticrypt-theme-switch__icon {
                color: var(--accent);
                font-size: 1.05rem;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 0.65rem;
                margin: 0 0 1rem;
                color: var(--muted);
                font-size: 1rem;
                font-style: italic;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 1.05rem;
                height: 1.05rem;
                margin: 0;
                accent-color: var(--accent);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                min-height: 3.4rem;
                border: 1px solid var(--accent-dark);
                background: var(--ink);
                color: var(--paper);
                cursor: pointer;
                font-family: inherit;
                font-size: 0.88rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent-dark);
                box-shadow: none;
                transform: translateY(-1px);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(0);
            }

            .staticrypt-margin {
                align-self: center;
                color: var(--muted);
                font-size: clamp(1rem, 1.35vw, 1.15rem);
                line-height: 1.5;
            }

            .staticrypt-margin-note {
                position: relative;
                margin: 0;
                padding: 1.4rem 0 0 1.2rem;
                border-top: 1px solid var(--rule-strong);
            }

            .staticrypt-margin-note::before {
                content: "private folio";
                display: block;
                margin-bottom: 1rem;
                color: var(--accent);
                font-size: 0.72rem;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                font-style: normal;
            }

            .staticrypt-margin-note strong {
                color: var(--ink);
                font-weight: 400;
                font-variant-caps: small-caps;
                letter-spacing: 0.05em;
            }

            .staticrypt-signature {
                margin-top: 2rem;
                color: var(--accent);
                font-size: 0.78rem;
                letter-spacing: 0.14em;
                text-transform: uppercase;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--paper);
            }

            .staticrypt-spinner {
                width: 2.5rem;
                height: 2.5rem;
                border: 1px solid var(--rule-strong);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.9s linear infinite;
            }

            @keyframes spinner-border {
                to { transform: rotate(360deg); }
            }

            @media (max-width: 820px) {
                .staticrypt-content {
                    align-items: flex-start;
                    padding-top: 3rem;
                }

                .staticrypt-page {
                    display: block;
                }

                .staticrypt-page::before {
                    display: none;
                }

                .staticrypt-margin {
                    width: min(100%, 34rem);
                    margin-top: 2rem;
                    font-size: 1rem;
                }

                .staticrypt-title {
                    max-width: 8ch;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                *, *::before, *::after {
                    animation-duration: 0.001ms !important;
                    transition-duration: 0.001ms !important;
                }
            }
        </style>
    </head>

            const notesTheme = (function () {
                const STORAGE_KEY = "notes-theme";
                const button = document.querySelector(".staticrypt-theme-switch");

                function preferredTheme() {
                    try {
                        const savedTheme = localStorage.getItem(STORAGE_KEY);
                        if (savedTheme === "dark" || savedTheme === "light") return savedTheme;
                    } catch (_error) {}

                    const hour = new Date().getHours();
                    return hour >= 19 || hour < 7 ? "dark" : "light";
                }

                function applyTheme(theme, persist) {
                    document.documentElement.setAttribute("data-theme", theme);

                    if (button) {
                        button.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
                        button.querySelector(".staticrypt-theme-switch__icon").textContent = theme === "dark" ? "☾" : "☼";
                        button.querySelector(".staticrypt-theme-switch__label").textContent = theme === "dark" ? "Dark" : "Light";
                        button.title = "Switch to " + (theme === "dark" ? "light" : "dark") + " theme";
                    }

                    if (persist) {
                        try { localStorage.setItem(STORAGE_KEY, theme); } catch (_error) {}
                    }
                }

                if (button) {
                    button.addEventListener("click", function () {
                        const nextTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
                        applyTheme(nextTheme, true);
                    });
                }

                applyTheme(preferredTheme(), false);
                return { applyTheme };
            })();

            // init the staticrypt engine
            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password
            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been
                // replaced, no need to do anything
                if (!isSuccessful) {
                    // hide loading screen
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");

                const passwordInput = document.getElementById("staticrypt-password");
                if (passwordInput.type === "password") {

                    toggleIcon.src = imgSrcEyeOpened;

            });

            // handle password form submission
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);
                }
            });
