name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --config _config.yml,_config_pages.yml
        env:
          JEKYLL_ENV: production

      - name: Encrypt generated HTML
        run: |
          npx --yes staticrypt@3.5.4 _site/* \
            --recursive \
            --directory _site \
            --config false \
            --salt 963fafb15267e0aaa90454bd9d59dd7b \
            --short \
            --remember 30 \
            --template-title "Protected Notes" \
            --template-instructions "Enter the password to read these notes."
          rm -f _site/feed.xml
        env:
          STATICRYPT_PASSWORD: notesnotes

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
